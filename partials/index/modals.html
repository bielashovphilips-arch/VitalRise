          <span class="section-label">Exercise Atlas</span>
          <h2 id="exercise-atlas-title">Атлас вправ</h2>

  <div class="payment-modal" id="payment-modal" aria-hidden="true">
    <div class="payment-backdrop" data-payment-close></div>
    <section class="payment-dialog" role="dialog" aria-modal="true" aria-labelledby="payment-title">
      <button type="button" class="payment-close" data-payment-close aria-label="Close">×</button>
      <span class="section-label" id="payment-kicker"></span>
      <h2 id="payment-title"></h2>
      <p id="payment-plan-note"></p>
      <div class="payment-summary">
        <div><span id="payment-plan-label"></span><strong id="payment-plan-value"></strong></div>
        <div><span id="payment-price-label"></span><strong id="payment-price-value"></strong></div>
      </div>
      <p id="payment-text"></p>
      <div class="payment-steps" aria-label="Checkout steps">
        <span data-i18n="payment.stepEmail">Email</span>
        <span data-i18n="payment.stepPay">Оплата</span>
        <span data-i18n="payment.stepAccess">Доступ</span>
      </div>
      <label class="payment-code-field" for="payment-email">
        <span id="payment-email-label"></span>
        <input type="email" id="payment-email" autocomplete="email" placeholder="client@example.com" />
      </label>
      <label class="payment-code-field" for="payment-access-code">
        <span id="payment-code-label"></span>
        <input type="text" id="payment-access-code" autocomplete="one-time-code" placeholder="VR-START-XXXX" />
      </label>
      <p class="payment-demo-note" id="payment-code-hint"></p>
      <label class="payment-demo-note payment-renewal-note" for="payment-renewal-consent">
        <input type="checkbox" id="payment-renewal-consent" />
        <span id="payment-renewal-label"></span>
      </label>
      <div class="payment-actions">
        <button type="button" class="btn btn-secondary" data-payment-close id="payment-close-button"></button>
        <button type="button" class="btn btn-secondary" id="payment-redeem-button"></button>
        <button type="button" class="btn btn-primary" id="payment-checkout-button"></button>
      </div>
      <div class="payment-status" id="payment-status" aria-live="polite"></div>
    </section>
  </div>

  <div class="mobile-report-modal" id="mobile-report-modal" aria-hidden="true">

        <div>
          <span class="mobile-report-kicker">VitalRise</span>
          <strong id="mobile-report-toolbar-title">Report</strong>

      </div>
      <div class="mobile-report-controls" id="mobile-report-controls">
        <label class="visually-hidden" for="mobile-report-scope">Формат звіту</label>

          <option value="current">Поточний тиждень</option>
        </select>
        <label class="visually-hidden" for="mobile-report-week">Тиждень</label>
        <select id="mobile-report-week" hidden>

        </div>
      </div>
    </div>
